name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: onlinev2

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Smoke experiment
        run: python -m onlinev2.experiments.cli --exp settlement --block core --outdir /tmp/outputs

      - name: Master comparison smoke
        run: python -m onlinev2.experiments.cli --exp master_comparison --block core --outdir /tmp/outputs_master
