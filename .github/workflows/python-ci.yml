name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        working-directory: onlinev2
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff check
        working-directory: onlinev2
        run: ruff check .

      - name: Pytest
        working-directory: onlinev2
        run: pytest -q
